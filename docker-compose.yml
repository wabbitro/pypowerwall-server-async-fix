version: '3.8'

services:
  pypowerwall-server:
    build: .
    container_name: pypowerwall-server
    ports:
      - "8675:8675"
    environment:
      # Single gateway mode - TEDAPI only (read-only)
      - PW_HOST=192.168.91.1
      - PW_GW_PWD=your-gateway-password
      
      # Optional: Add cloud auth for control operations
      # First run: python3 -m pypowerwall setup (generates auth files)
      # - PW_EMAIL=your-tesla-account@email.com
      # - PW_AUTHPATH=/auth
      
      - PW_TIMEZONE=America/Los_Angeles
      
      # Or multi-gateway mode (uncomment and edit):
      # - PW_GATEWAYS=[{"id":"home","name":"Home","host":"192.168.91.1","gw_pwd":"your_gateway_password","email":"tesla@email.com","authpath":"/auth"}]
      
      # CORS settings
      - CORS_ORIGINS=["*"]
      
      # Reverse proxy sub-path (optional) - uncomment if serving under a prefix
      # - PROXY_BASE_URL=/pypowerwall
      
      # MQTT (optional) - uncomment and set MQTT_HOST to enable
      # - MQTT_HOST=192.168.1.100
      # - MQTT_PORT=1883
      # - MQTT_USERNAME=mqttuser
      # - MQTT_PASSWORD=mqttpassword
      # - MQTT_HA_DISCOVERY=true      # auto-configure Home Assistant sensors
      # - MQTT_TOPIC_PREFIX=pypowerwall
      # - MQTT_TLS=false
      
      # Control features (optional) - Uncomment to enable:
      # - CONTROL_ENABLED=true
      # - CONTROL_TOKEN=your-secure-random-token-here
    # Health check - verifies the server process is running and responding.
    # /health always returns HTTP 200 regardless of gateway connectivity,
    # making it safe for process-level liveness checking. wget is included
    # in the image for this purpose.
    healthcheck:
      test: wget --spider -q http://localhost:8675/health || exit 1
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 60s
    restart: unless-stopped
    networks:
      - pypowerwall

networks:
  pypowerwall:
    driver: bridge
